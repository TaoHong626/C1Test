<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simulación Administración del Estado C1</title>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #f5f6f7; overflow: hidden; display: flex; justify-content: center; align-items: center; font-family: Arial, sans-serif; touch-action: none; }
        #canvas { display: block; width: 100%; height: 100%; max-width: 100%; max-height: 100%; background-color: #f5f6f7; opacity: 0; transition: opacity 0.1s ease-in-out; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        #canvas.visible { opacity: 1; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #333; font-family: Arial, sans-serif; font-size: 18px; text-align: center; z-index: 100; }
        .spinner { border: 4px solid #333; border-top: 4px solid #081224; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        #mobile-keyboard-hack { position: fixed; top: -9999px; left: -9999px; width: 0; height: 0; opacity: 0; border: none; outline: none; pointer-events: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <script>
        var vConsole = new VConsole();
        console.log('[VConsole] 已启用');
    </script>
    <div id="loading"><div class="spinner"></div><p>Cargando simulación...</p></div>
    <canvas id="canvas"></canvas>
    <input id="mobile-keyboard-hack" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />

    <script type="text/javascript">
        var canvas = document.getElementById('canvas');
        var dpr = window.devicePixelRatio || 1;
        var wasmReady = false;
        var imguiReady = false;
        var resizeTimeout = null;
        var lastWidth = 0;
        var lastHeight = 0;

        if (!document.exitPointerLock) document.exitPointerLock = function() {};
        if (!document.requestPointerLock) document.requestPointerLock = function() {};
        if (!Element.prototype.requestPointerLock) Element.prototype.requestPointerLock = function() {};
        if (!Element.prototype.exitPointerLock) Element.prototype.exitPointerLock = function() {};

        function updateCanvas(force) {
            var rect = canvas.getBoundingClientRect();
            var newWidth = Math.floor(rect.width * dpr);
            var newHeight = Math.floor(rect.height * dpr);
            if (!force && lastWidth === newWidth && lastHeight === newHeight) return;
            lastWidth = newWidth;
            lastHeight = newHeight;
            canvas.width = newWidth;
            canvas.height = newHeight;
            if (wasmReady && imguiReady && Module.ccall) {
                try {
                    Module.ccall('Safe_ImGui_ImplGlfw_SetDisplaySize', 'void', ['number', 'number'], [rect.width, rect.height]);
                    Module.ccall('Safe_ImGui_ImplGlfw_SetFramebufferScale', 'void', ['number', 'number'], [dpr, dpr]);
                } catch (e) {}
            }
        }

        function handleResize() {
            if (resizeTimeout) clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function() { updateCanvas(false); }, 100);
        }
        window.addEventListener('resize', handleResize);
        window.addEventListener('orientationchange', handleResize);

        canvas.addEventListener('wheel', function(e) {
            e.preventDefault();
            if (wasmReady && imguiReady && Module.ccall) {
                try {
                    var smoothFactor = 0.02;
                    var xoffset = e.deltaX * smoothFactor;
                    var yoffset = -e.deltaY * smoothFactor;
                    var maxScroll = 2.0;
                    xoffset = Math.max(-maxScroll, Math.min(maxScroll, xoffset));
                    yoffset = Math.max(-maxScroll, Math.min(maxScroll, yoffset));
                    Module.ccall('Safe_ImGui_ImplGlfw_ScrollWheel', 'void', ['number', 'number'], [xoffset, yoffset]);
                } catch (err) {}
            }
        }, { passive: false });

        function sendSyntheticMouse(type, touch) {
            var mouseEvent = new MouseEvent(type, {
                clientX: touch.clientX,
                clientY: touch.clientY,
                button: 0,
                buttons: type === 'mouseup' ? 0 : 1,
                bubbles: true,
                cancelable: true,
                view: window
            });
            canvas.dispatchEvent(mouseEvent);
        }

        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopImmediatePropagation();
            if (e.touches.length > 0) {
                sendSyntheticMouse('mousemove', e.touches[0]);
                sendSyntheticMouse('mousedown', e.touches[0]);
            }
        }, { passive: false, capture: true });

        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            e.stopImmediatePropagation();
            if (e.touches.length > 0) {
                sendSyntheticMouse('mousemove', e.touches[0]);
            }
        }, { passive: false, capture: true });

        canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            e.stopImmediatePropagation();
            if (e.changedTouches.length > 0) {
                sendSyntheticMouse('mouseup', e.changedTouches[0]);
                if (wasmReady && imguiReady && Module.ccall) {
                    var wantsInput = Module.ccall('Safe_ImGui_WantTextInput', 'boolean', [], []);
                    wantsInput ? focusInput() : blurInput();
                }
            }
        }, { passive: false, capture: true });

        canvas.addEventListener('touchcancel', function(e) {
            e.preventDefault();
            e.stopImmediatePropagation();
            if (e.changedTouches.length > 0) {
                sendSyntheticMouse('mouseup', e.changedTouches[0]);
            }
        }, { passive: false, capture: true });

        function notifyImGuiReady() {
            imguiReady = true;
            updateCanvas(true);
        }

        var hiddenInput = document.getElementById('mobile-keyboard-hack');

        // 设置输入事件监听器
        function setupInputListeners() {
            if (!hiddenInput) return;

            // 处理普通输入事件（英文/数字/西班牙文）
            hiddenInput.addEventListener('input', function(e) {
                var text = e.target.value;
                console.log('[Keyboard] input event:', text);
                if (text && Module._ImGui_InjectChar) {
                    for (var i = 0; i < text.length; i++) {
                        Module._ImGui_InjectChar(text.charCodeAt(i));
                    }
                    e.target.value = '';
                }
            });

            // 处理键盘事件（仅处理控制键，避免与 input 事件冲突）
            hiddenInput.addEventListener('keydown', function(e) {
                console.log('[Keyboard] keydown event:', e.key);
                
                // 阻止事件冒泡到 canvas，防止 Emscripten 重复处理
                e.stopPropagation();
                
                if (e.key === 'Backspace') {
                    if (Module._ImGui_InjectChar) {
                        Module._ImGui_InjectChar(8);
                        console.log('[Keyboard] 注入退格键');
                    }
                    e.preventDefault();
                } else if (e.key === 'Enter') {
                    if (Module._ImGui_InjectChar) {
                        Module._ImGui_InjectChar(13);
                        console.log('[Keyboard] 注入回车键');
                    }
                    e.preventDefault();
                } else if (e.key === 'Tab') {
                    if (Module._ImGui_InjectChar) {
                        Module._ImGui_InjectChar(9);
                        console.log('[Keyboard] 注入Tab键');
                    }
                    e.preventDefault();
                } else if (e.key === 'Delete') {
                    if (Module._ImGui_InjectChar) {
                        Module._ImGui_InjectChar(127);
                        console.log('[Keyboard] 注入Delete键');
                    }
                    e.preventDefault();
                }
                // 数字/字母：只 stopPropagation，不 preventDefault
                // 让 input 事件正常触发处理字符
            });

            // iOS中文键盘支持（简化版）
            hiddenInput.addEventListener('compositionend', function(e) {
                var text = e.data;
                console.log('[Keyboard] compositionend event:', text);
                if (text && Module._ImGui_InjectChar) {
                    for (var i = 0; i < text.length; i++) {
                        Module._ImGui_InjectChar(text.charCodeAt(i));
                    }
                    console.log('[Keyboard] 通过composition注入字符');
                }
            });
        }

        function focusInput() { 
            if (hiddenInput) hiddenInput.focus(); 
        }
        function blurInput() { 
            if (hiddenInput) { 
                hiddenInput.blur(); 
                hiddenInput.value = '';
            }
        }

        var Module = {
            canvas: canvas,
            setStatus: function() {},
            onRuntimeInitialized: function() {
                wasmReady = true;
                setTimeout(function() { 
                    document.getElementById('loading').style.display = 'none'; 
                    canvas.classList.add('visible'); 
                }, 50);
            },
            print: function() {},
            printErr: function() {}
        };

        document.addEventListener('DOMContentLoaded', function() {
            setupInputListeners();
            var rect = canvas.getBoundingClientRect();
            var displayWidth = Math.floor(rect.width);
            var displayHeight = Math.floor(rect.height);
            if (displayWidth <= 0 || displayHeight <= 0) { 
                displayWidth = 1280; 
                displayHeight = 720; 
            }
            canvas.width = Math.floor(displayWidth * dpr); 
            canvas.height = Math.floor(displayHeight * dpr);
            window._initialWidth = displayWidth; 
            window._initialHeight = displayHeight;
            var script = document.createElement('script'); 
            script.src = 'simulacion.js'; 
            script.async = true; 
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
