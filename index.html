<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simulación Administración del Estado C1</title>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #f5f6f7; overflow: hidden; display: flex; justify-content: center; align-items: center; font-family: Arial, sans-serif; touch-action: none; }
        #canvas { display: block; width: 100%; height: 100%; max-width: 100%; max-height: 100%; background-color: #f5f6f7; opacity: 0; transition: opacity 0.1s ease-in-out; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        #canvas.visible { opacity: 1; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #333; font-family: Arial, sans-serif; font-size: 18px; text-align: center; z-index: 100; }
        .spinner { border: 4px solid #333; border-top: 4px solid #081224; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        /* 移动端键盘输入隐藏输入框 - 由 C++ WakeUpMobileKeyboard 函数动态创建 */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <script>
        // 强制启用 VConsole
        var vConsole = new VConsole();
        console.log('[VConsole] 已启用 - 可以在手机上打开控制台查看日志');
    </script>
    <div id="loading"><div class="spinner"></div><p>Cargando simulación...</p></div>
    <canvas id="canvas"></canvas>

    <script type="text/javascript">
        var canvas = document.getElementById('canvas');
        var dpr = window.devicePixelRatio || 1;
        // 动态调整 DPR：高端设备使用 2.5，低端设备使用 2.0
        if (navigator.hardwareConcurrency >= 4) {
            dpr = Math.min(dpr, 2.5);
        } else {
            dpr = Math.min(dpr, 2.0);
        }
        var wasmReady = false;
        var imguiReady = false;
        var resizeTimeout = null;
        var lastWidth = 0;
        var lastHeight = 0;

        if (!document.exitPointerLock) document.exitPointerLock = function() {};
        if (!document.requestPointerLock) document.requestPointerLock = function() {};
        if (!Element.prototype.requestPointerLock) Element.prototype.requestPointerLock = function() {};
        if (!Element.prototype.exitPointerLock) Element.prototype.exitPointerLock = function() {};

        function updateCanvas(force) {
            var rect = canvas.getBoundingClientRect();
            var newWidth = Math.floor(rect.width * dpr);
            var newHeight = Math.floor(rect.height * dpr);
            if (!force && lastWidth === newWidth && lastHeight === newHeight) return;
            lastWidth = newWidth; lastHeight = newHeight;
            canvas.width = newWidth; canvas.height = newHeight;
            if (wasmReady && imguiReady && Module.ccall) {
                try { 
                    Module.ccall('Safe_ImGui_ImplGlfw_SetDisplaySize', 'void', ['number', 'number'], [rect.width, rect.height]); 
                    Module.ccall('Safe_ImGui_ImplGlfw_SetFramebufferScale', 'void', ['number', 'number'], [dpr, dpr]); 
                } catch (e) {}
            }
        }

        function handleResize() { 
            if (resizeTimeout) clearTimeout(resizeTimeout); 
            resizeTimeout = setTimeout(function() { updateCanvas(false); }, 100); 
        }
        window.addEventListener('resize', handleResize); 
        window.addEventListener('orientationchange', handleResize);

        var scrollAccumulatorX = 0; 
        var scrollAccumulatorY = 0;
        canvas.addEventListener('wheel', function(e) {
            e.preventDefault();
            if (wasmReady && imguiReady && Module.ccall) {
                try {
                    var smoothFactor = 0.02;
                    var xoffset = e.deltaX * smoothFactor;
                    var yoffset = -e.deltaY * smoothFactor;
                    var maxScroll = 2.0;
                    xoffset = Math.max(-maxScroll, Math.min(maxScroll, xoffset));
                    yoffset = Math.max(-maxScroll, Math.min(maxScroll, yoffset));
                    Module.ccall('Safe_ImGui_ImplGlfw_ScrollWheel', 'void', ['number', 'number'], [xoffset, yoffset]);
                } catch (err) {}
            }
        }, { passive: false });

        function sendSyntheticMouse(type, touch) {
            var mouseEvent = new MouseEvent(type, {
                clientX: touch.clientX,
                clientY: touch.clientY,
                button: 0,
                buttons: type === 'mouseup' ? 0 : 1,
                bubbles: true,
                cancelable: true,
                view: window
            });
            canvas.dispatchEvent(mouseEvent);
        }

        // 触摸滑动支持
        var lastTouchY = 0;
        var lastTouchTime = 0;
        var velocity = 0;
        var isScrolling = false;
        var inertiaFrame = null;
        
        // 连续滚动支持
        var scrollAnimationFrame = null;
        var targetScrollVelocity = 0;
        var currentScrollVelocity = 0;

        // 滑动配置参数
        var scrollThreshold = 2;        // 更低阈值，更容易触发滚动
        var maxScrollDelta = 1.0;       // 更小单次滚动量，更平滑
        var inertiaFriction = 0.98;     // 更大衰减，惯性更自然持久
        var minInertiaVelocity = 0.1;   // 更低最小速度，惯性更容易触发
        var smoothFactor = 0.4;         // 增大平滑因子，更快响应速度变化

        canvas.addEventListener('touchstart', function(e) { 
            e.preventDefault(); 
            console.log('[Touch] touchstart', { 
                x: e.touches[0].clientX, 
                y: e.touches[0].clientY 
            });
            if (e.touches.length > 0) { 
                lastTouchY = e.touches[0].clientY;
                lastTouchTime = Date.now();
                velocity = 0;
                isScrolling = false;
                
                if (inertiaFrame) {
                    cancelAnimationFrame(inertiaFrame);
                    inertiaFrame = null;
                }
                
                sendSyntheticMouse('mousemove', e.touches[0]); 
            } 
        }, { passive: false });

        canvas.addEventListener('touchmove', function(e) { 
            e.preventDefault(); 
            if (e.touches.length > 0) { 
                var currentY = e.touches[0].clientY;
                var currentTime = Date.now();
                
                var deltaY = lastTouchY - currentY;
                var deltaTime = currentTime - lastTouchTime;
                
                console.log('[Touch] touchmove', { deltaY: deltaY });
                
                if (deltaTime > 0) {
                    velocity = deltaY / deltaTime;
                }
                
                // 简化：只要有移动就设置目标速度
                if (Math.abs(deltaY) > 0) {
                    isScrolling = true;
                    
                    // 设置目标滚动速度，由连续滚动循环处理
                    targetScrollVelocity = -deltaY * 0.4;
                    targetScrollVelocity = Math.max(-maxScrollDelta, Math.min(maxScrollDelta, targetScrollVelocity));
                    
                    console.log('[Touch] scroll', { targetVelocity: targetScrollVelocity });
                }
                
                lastTouchY = currentY;
                lastTouchTime = currentTime;
            } 
        }, { passive: false });

        canvas.addEventListener('touchend', function(e) { 
            e.preventDefault(); 
            console.log('[Touch] touchend', { 
                isScrolling: isScrolling,
                velocity: velocity 
            });
            if (e.changedTouches.length > 0) { 
                var touch = e.changedTouches[0];
                
                // 点击事件：延迟聚焦策略（方案 B）
                // 先发送鼠标事件让 ImGui 更新状态，再检查是否需要输入
                if (!isScrolling) {
                    console.log('[Touch] 发送点击事件');
                    sendSyntheticMouse('mousemove', touch); 
                    sendSyntheticMouse('mousedown', touch); 
                    sendSyntheticMouse('mouseup', touch); 
                    
                    // 延迟检查 ImGui 是否需要输入
                    // 让 ImGui 有足够时间处理点击事件并更新 WantTextInput 状态
                    setTimeout(function() {
                        if (wasmReady && imguiReady && Module.ccall) { 
                            var wantsInput = Module.ccall('Safe_ImGui_WantTextInput', 'boolean', [], []); 
                            console.log('[Touch] WantTextInput:', wantsInput);
                            if (wantsInput) {
                                console.log('[Touch] 需要输入，调用 WakeUpMobileKeyboard');
                                // 调用 C++ 端的键盘唤醒函数，处理完整的输入法事件
                                Module.ccall('WakeUpMobileKeyboard', 'void', [], []);
                            }
                        }
                    }, 30);
                }
                
                // 惯性滚动：使用 velocity 设置目标速度
                if (isScrolling && Math.abs(velocity) > minInertiaVelocity) {
                    console.log('[Touch] 启动惯性滚动', { velocity: velocity });
                    targetScrollVelocity = velocity * 0.4; // 增大系数，惯性更明显
                } else {
                    targetScrollVelocity = 0;
                }
            } 
        }, { passive: false });

        canvas.addEventListener('touchcancel', function(e) { 
            e.preventDefault(); 
            console.log('[Touch] touchcancel');
            if (e.changedTouches.length > 0) { 
                if (!isScrolling) {
                    sendSyntheticMouse('mouseup', e.changedTouches[0]); 
                }
                targetScrollVelocity = 0;
            } 
        }, { passive: false });

        // 连续滚动循环 - 实现丝滑滚动效果
        function smoothScrollLoop() {
            // 使用平滑插值，让滚动更丝滑
            currentScrollVelocity += (targetScrollVelocity - currentScrollVelocity) * smoothFactor;
            
            // 惯性衰减
            if (Math.abs(targetScrollVelocity) < 0.01) {
                currentScrollVelocity *= inertiaFriction;
            }
            
            // 发送滚动事件
            if (Math.abs(currentScrollVelocity) > 0.01) {
                if (wasmReady && imguiReady && Module.ccall) {
                    try {
                        Module.ccall('Safe_ImGui_ImplGlfw_ScrollWheel', 'void', ['number', 'number'], [0, currentScrollVelocity]);
                    } catch (err) {}
                }
            }
            
            scrollAnimationFrame = requestAnimationFrame(smoothScrollLoop);
        }

        function notifyImGuiReady() {
            imguiReady = true;
            updateCanvas(true);
            
            // 启动连续滚动循环
            if (!scrollAnimationFrame) {
                console.log('[Touch] 启动连续滚动循环');
                smoothScrollLoop();
            }
        }

        // 方案 B：键盘唤起由 C++ 端 WakeUpMobileKeyboard 函数处理

        var Module = {
            canvas: canvas,
            setStatus: function() {},
            onRuntimeInitialized: function() {
                wasmReady = true;
                setTimeout(function() { 
                    document.getElementById('loading').style.display = 'none'; 
                    canvas.classList.add('visible'); 
                }, 50);
            },
            print: function() {},
            printErr: function() {}
        };

        document.addEventListener('DOMContentLoaded', function() {
            var rect = canvas.getBoundingClientRect();
            var displayWidth = Math.floor(rect.width);
            var displayHeight = Math.floor(rect.height);
            if (displayWidth <= 0 || displayHeight <= 0) { 
                displayWidth = 1280; 
                displayHeight = 720; 
            }
            canvas.width = Math.floor(displayWidth * dpr); 
            canvas.height = Math.floor(displayHeight * dpr);
            window._initialWidth = displayWidth; 
            window._initialHeight = displayHeight;
            var script = document.createElement('script'); 
            script.src = 'simulacion.js'; 
            script.async = true; 
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
